<head>
  <title>@@title</title>
  <meta charset="UTF-8" />
  <meta name="format-detection" content="telephone=no" />
  <link rel="shortcut icon" href="favicon.ico" />
  <!-- <meta name="robots" content="noindex, nofollow"> -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1" />

  <!-- critical js -->
  <script>
    document.fonts.ready.then(function () {
      const e = document.getElementById('loader-time');
      if (e) {
        setInterval(function () {
          const n = new Date();
          let t = n.getHours(),
            o = n.getMinutes(),
            l = n.getSeconds();
          t < 10 && (t = '0' + t),
            o < 10 && (o = '0' + o),
            l < 10 && (l = '0' + l),
            (e.innerHTML = `${t + ':'}${o + ':'}${l}`);
        }, 500);
      }
      const n = document.querySelectorAll('.preloader__progress');
      if (n.length) {
        for (let e = 0; e < n.length; e++) {
          const t = n[e];
          let o = 0,
            l = setInterval(function () {
              (t.innerHTML = ++o), o >= 99 && clearInterval(l);
            }, 10);
        }
      }
    }),
      (document.fonts.onloadingdone = function (e) {
        document.documentElement.classList.add('_fonts-loaded');
      });
  </script>

  <noscript>
    <div
      style="
        font-size: large;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100dvw;
        height: 100dvh;
      ">
      You don't have javascript enabled
    </div>
  </noscript>

  <link rel="stylesheet" href="css/style.css" />
  <link
    rel="preload"
    href="https://unpkg.com/lenis@1.2.3/dist/lenis.css"
    as="style"
    onload="this.rel='stylesheet'" />
</head>
